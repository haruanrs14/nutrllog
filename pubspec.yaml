name: nutrilog
description: "NutriLog - App de acompanhamento alimentar que conecta clientes e nutricionistas."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Gerenciamento de estado (requisito do trabalho)
  provider: ^6.1.2

  # Firebase — descomente APENAS após rodar: flutterfire configure
  # Sem o arquivo firebase_options.dart gerado pelo CLI, essas libs
  # travam o app na inicialização mesmo sem chamar Firebase.initializeApp().
  # firebase_core: ^3.6.0
  # firebase_auth: ^5.3.1
  # cloud_firestore: ^5.4.4
  # firebase_storage: ^12.3.4

  # Persistência local — salva sessão e refeições sem precisar do Firebase em dev
  shared_preferences: ^2.3.2

  # Sensores do dispositivo (câmera + GPS — requisito do trabalho)
  image_picker: ^1.1.2
  geolocator: ^13.0.1

  # Utilitários de data/localização
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
